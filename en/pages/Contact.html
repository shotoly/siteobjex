<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Objex3D</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="../../photo/logo_vecteur_violet_électrique.svg" />
    <link rel="stylesheet" href="../../style/style.css">
    <style>
        .contact-card {
            background: var(--couleur-fond);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        [data-theme="dark"] .contact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .contact-icon {
            font-size: 3rem;
            color: var(--provence-violet);
            margin-bottom: 20px;
        }
        .contact-info {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <a href="../index.html">
                <img src="../../photo/logo_vecteur_blanc.svg" alt="Logo Objex3D" style="height: 50px;">
            </a>
        </div>
        <div class="menu-toggle" id="mobile-menu">
            <i class="fa-solid fa-bars"></i>
        </div>
        <nav class="menu-droite">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="portfolio.html">My Projects</a></li>
                <li><a href="services.html">My Services</a></li>
                <li><a href="Contact.html" style="color: var(--provence-violet);">Contact</a></li>
                <li><a href="../../pages/Contact.html" style="border: 2px solid var(--provence-violet); border-radius: 20px; padding: 4px 12px; margin-left: 10px;">FR</a></li>
                <li id="theme-toggle-li"><a href="#" id="theme-toggle"><i class="fa-solid fa-moon"></i></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Header Page -->
        <section class="section-titre-geants reveal-on-scroll" style="position: relative; padding-top: 15vw; min-height: 40vh; display: flex; align-items: center;">
            <div class="inner-wrap" style="position: relative; z-index: 1;">
                <div class="gTitre">
                    <div class="line-flex">
                        <span class="gTitre split">CONTACT ME</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="contact-info" class="p60" style="min-height: 50vh;">
            <div class="contact-card reveal-on-scroll">
                <i class="fa-solid fa-envelope contact-icon"></i>
                <h2 style="font-family: var(--police-titre); font-size: 2.5rem; margin-bottom: 30px;">Let's chat together</h2>
                <div class="contact-info">
                    <i class="fa-solid fa-map-location-dot" style="color: var(--provence-vert);"></i> Salon-de-Provence, France
                </div>
                <div class="contact-info">
                    <a href="https://www.linkedin.com/in/robin-jallade-6732392ba" target="_blank" class="btn-brutal" style="margin-top: 20px;">
                        <i class="fa-brands fa-linkedin"></i> My LinkedIn Profile
                    </a>
                </div>
                <div class="contact-info" style="margin-top: 30px;">
                    <a href="https://www.instagram.com/objex.3d/" target="_blank" style="color: var(--couleur-texte); font-size: 2rem;">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                </div>
            </div>
        </section>

        <!-- Footer Fancy -->
        <section class="footer fancy-footer reveal-on-scroll" id="footer">
            <div class="footer-backdrop"></div>
            <div class="footer-content">
                <div class="col col1">
                    <h3 class="footer-logo">Objex3D</h3>
                    <p class="footer-sub">Robin Jallade</p>
                    <div class="social">
                        <a href="https://www.instagram.com/objex.3d/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                        <a href="https://www.linkedin.com/in/robin-jallade-6732392ba" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                    </div>
                </div>
                <div class="col col2">
                    <p style="margin-bottom: 25px;"><b>Categories</b></p>
                    <p><a class="link-act" href="portfolio.html">My Projects</a></p>
                    <p><a class="link-act" href="services.html">My Services</a></p>
                </div>
            </div>
        </section>
    </main>

    <script src="../../js/script.js"></script>
</body>
</html>
